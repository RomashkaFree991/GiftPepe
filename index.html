<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:#000}

  .app{
    position:relative;width:100%;height:100%;
    background:url('background_pepe.png') center/cover no-repeat;
  }

  .top-bar{
    position:absolute;top:12px;left:12px;right:12px;
    display:flex;align-items:center;justify-content:space-between;
    z-index:10;
  }

  .user-pill{
    display:flex;align-items:center;gap:8px;
    height:38px;padding:4px 14px 4px 4px;
    border-radius:999px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.06);
  }
  .user-avatar{
    width:30px;height:30px;border-radius:50%;
    object-fit:cover;background:rgba(255,255,255,.15);flex-shrink:0;
  }
  .user-name{
    color:#fff;font-size:14px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;
  }

  .right-group{display:flex;align-items:center;gap:6px}

  .balance-pill{
    display:flex;align-items:center;gap:6px;
    height:38px;padding:0 10px;
    border-radius:999px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.06);
    color:#fff;font-size:15px;font-weight:600;
  }
  .balance-pill .star-icon{
    width:20px;height:20px;object-fit:contain;
    filter:drop-shadow(0 0 4px rgba(255,200,0,.5));
  }

  .add-btn{
    width:38px;height:38px;border-radius:50%;
    background:#3478f6;
    display:flex;align-items:center;justify-content:center;
    border:none;cursor:pointer;
    box-shadow:0 2px 14px rgba(52,120,246,.5);
    transition:transform .15s ease;flex-shrink:0;
  }

  .add-btn svg{width:22px;height:22px}

  /* === BOTTOM NAV === */
  .bottom-nav{
    position:absolute;
    bottom:14px;left:12px;right:12px;
    padding:8px 6px;
    display:flex;align-items:center;justify-content:space-around;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:999px;
    z-index:10;
  }

  .nav-indicator{
    position:absolute;
    width:58px;height:58px;
    border-radius:50%;
    background:rgba(0,122,255,.13);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    z-index:1;
    pointer-events:none;
    top:0;left:0;
  }

  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:4px 0;
    width:56px;
    cursor:pointer;position:relative;
    transition:transform .15s ease;
    -webkit-user-select:none;user-select:none;
    z-index:2;
  }


  .nav-icon{
    width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    position:relative;z-index:2;
  }
  .nav-icon img{
    width:24px;height:24px;object-fit:contain;
    transition:opacity .25s ease;
  }

  .nav-label{
    font-size:10px;font-weight:500;
    color:rgba(255,255,255,.4);
    transition:color .25s ease;
    position:relative;z-index:2;
  }

  .nav-item.active .nav-label{color:#007AFF}
  .nav-item.active .nav-icon img{opacity:1;filter:brightness(0) saturate(100%) invert(33%) sepia(100%) saturate(3000%) hue-rotate(207deg) brightness(103%) contrast(101%)}
  .nav-item:not(.active) .nav-icon img{opacity:.4}
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="user-pill">
      <img class="user-avatar" id="avatar" src="" alt="">
      <span class="user-name" id="username">User</span>
    </div>
    <div class="right-group">
      <div class="balance-pill">
        <span>0</span>
        <img class="star-icon" src="star.png" alt="star">
      </div>
      <button class="add-btn" aria-label="Add">
        <svg fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <nav class="bottom-nav" id="bottomNav">
    <div class="nav-indicator" id="indicator"></div>
    <div class="nav-item active" data-tab="top">
      <div class="nav-icon"><img src="trophy.svg" alt=""></div>
      <span class="nav-label">Топ</span>
    </div>
    <div class="nav-item" data-tab="craft">
      <div class="nav-icon"><img src="craft.svg" alt=""></div>
      <span class="nav-label">Крафт</span>
    </div>
    <div class="nav-item" data-tab="crash">
      <div class="nav-icon"><img src="crash.svg" alt=""></div>
      <span class="nav-label">Краш</span>
    </div>
    <div class="nav-item" data-tab="upgrade">
      <div class="nav-icon"><img src="rise.svg" alt=""></div>
      <span class="nav-label">Апгрейд</span>
    </div>
    <div class="nav-item" data-tab="profile">
      <div class="nav-icon"><img src="user.svg" alt=""></div>
      <span class="nav-label">Профиль</span>
    </div>
  </nav>

</div>

<script>
  const tg=window.Telegram?.WebApp;
  if(tg){
    tg.ready();tg.expand();
    const u=tg.initDataUnsafe?.user;
    if(u){
      document.getElementById('username').textContent=u.first_name||u.username||'User';
      if(u.photo_url)document.getElementById('avatar').src=u.photo_url;
    }
  }

  const nav=document.getElementById('bottomNav');
  const ind=document.getElementById('indicator');
  const items=document.querySelectorAll('.nav-item');

  function moveIndicator(el,animate){
    const r=el.getBoundingClientRect();
    const n=nav.getBoundingClientRect();
    const x=r.left+r.width/2-n.left-29;
    const y=r.top+r.height/2-n.top-29;
    if(!animate)ind.style.transition='none';
    ind.style.transform=`translate(${x}px,${y}px)`;
    if(!animate)requestAnimationFrame(()=>{ind.style.transition=''});
  }

  requestAnimationFrame(()=>moveIndicator(document.querySelector('.nav-item.active'),false));

  items.forEach(item=>{
    item.addEventListener('click',()=>{
      document.querySelector('.nav-item.active')?.classList.remove('active');
      item.classList.add('active');
      moveIndicator(item,true);
    });
  });
</script>
</body>
</html>
