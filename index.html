<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:#000 url('assets/background_pepe.png') center/cover no-repeat}
  .app{position:relative;width:100%;height:100%}

  /* === TOP BAR === */
  .top-bar{
    position:absolute;top:82px;left:12px;right:12px;
    display:flex;align-items:center;justify-content:space-between;z-index:10;
  }
  .user-pill{
    display:flex;align-items:center;gap:8px;
    height:38px;padding:4px 14px 4px 4px;border-radius:999px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.06);
  }
  .user-avatar-small{width:30px;height:30px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,.15);flex-shrink:0}
  .user-name-top{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .right-group{display:flex;align-items:center;gap:6px}
  .balance-pill{
    display:flex;align-items:center;gap:6px;height:38px;padding:0 10px;border-radius:999px;
    background:rgba(255,255,255,.1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.06);color:#fff;font-size:15px;font-weight:600;
  }
  .balance-pill .star-icon{width:20px;height:20px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(255,200,0,.5))}
  .add-btn{
    width:38px;height:38px;border-radius:50%;background:#3478f6;
    display:flex;align-items:center;justify-content:center;
    border:none;cursor:pointer;box-shadow:0 2px 14px rgba(52,120,246,.5);flex-shrink:0;
  }
  .add-btn svg{width:22px;height:22px}



  /* === CONTENT PAGES === */
  .page{
    position:absolute;top:0;left:12px;right:12px;bottom:90px;
    padding-top:136px;
    z-index:9;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .page::-webkit-scrollbar{display:none}
  .page.visible{display:block;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .section-title{color:#fff;font-size:17px;font-weight:700;margin-bottom:10px}

  /* === PROFILE === */
  .profile-card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;padding:20px 16px 18px;
    display:flex;flex-direction:column;align-items:center;margin-bottom:20px;
  }
  .profile-avatar-wrap{position:relative;width:88px;height:88px;margin-bottom:12px}
  .profile-avatar{
    width:88px;height:88px;border-radius:50%;object-fit:cover;
    background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.1);
  }
  .settings-badge{
    position:absolute;bottom:-2px;left:-2px;width:26px;height:26px;border-radius:7px;
    background:rgba(255,255,255,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .settings-badge svg{width:14px;height:14px}
  .profile-name{color:#fff;font-size:18px;font-weight:700;margin-bottom:3px}
  .profile-username{color:rgba(255,255,255,.45);font-size:14px;font-weight:500}

  /* Promo */
  .promo-input-wrap{
    display:flex;align-items:center;
    background:rgba(255,255,255,.08);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
    border:1px solid rgba(255,255,255,.08);border-radius:14px;
    padding:4px 4px 4px 14px;margin-bottom:14px;height:48px;
  }
  .promo-input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;font-weight:500}
  .promo-input::placeholder{color:rgba(255,255,255,.3)}
  .promo-btn{
    height:40px;padding:0 16px;border-radius:12px;background:#007AFF;
    color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;
  }

  /* Referral */
  .referral-card{
    background:#007AFF;border-radius:18px;padding:18px 16px;
    display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:20px;
  }
  .referral-text{flex:1}
  .referral-text h3{color:#fff;font-size:14px;font-weight:800;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
  .referral-text p{color:rgba(255,255,255,.75);font-size:12px;font-weight:500;line-height:1.35}
  .referral-arrow{
    width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .referral-arrow svg{width:18px;height:18px}

  /* Inventory */
  .inventory-header{display:flex;align-items:center;margin-bottom:14px;gap:8px}
  .inventory-title{color:#fff;font-size:17px;font-weight:700}
  .inventory-count{color:rgba(255,255,255,.35);font-size:13px;font-weight:500}
  .sell-all-btn{
    margin-left:auto;display:flex;align-items:center;gap:5px;
    height:32px;padding:0 12px;border-radius:10px;
    border:1.5px dashed rgba(255,255,255,.2);background:none;
    color:rgba(255,255,255,.45);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .sell-all-btn img{width:14px;height:14px;object-fit:contain;filter:drop-shadow(0 0 3px rgba(255,200,0,.4))}

  .inventory-empty{display:flex;flex-direction:column;align-items:center;padding:20px 0 20px}
  .lottie-wrap{width:140px;height:140px;margin-bottom:18px}
  .empty-title{color:#fff;font-size:16px;font-weight:700;margin-bottom:6px}
  .empty-desc{color:rgba(255,255,255,.4);font-size:13px;font-weight:500;text-align:center;line-height:1.4;max-width:280px}
  .empty-desc a{color:#007AFF;text-decoration:none;font-weight:600}

  /* === UPGRADE === */
  .upgrade-page{display:flex;flex-direction:column;align-items:center;padding-top:0}
  .upgrade-circle-outer{
    width:260px;height:260px;border-radius:50%;
    background:#1a1a1e;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:24px;
  }
  .upgrade-circle-inner{
    width:220px;height:220px;border-radius:50%;
    background:#111114;
    display:flex;align-items:center;justify-content:center;
  }
  .upgrade-circle-inner img{
    width:220px;height:220px;object-fit:contain;
    opacity:.35;
  }
  .upgrade-subtitle{
    color:rgba(255,255,255,.4);font-size:14px;font-weight:600;
    margin-bottom:20px;
  }

  .slots-row{
    display:flex;align-items:center;gap:14px;
    width:100%;padding:0 4px;
    margin-bottom:14px;
  }
  .slot-cell{
    flex:1;height:110px;border-radius:22px;
    background:#1a1a1e;
    border:1.5px dashed rgba(255,255,255,.12);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .slot-cell span{
    color:rgba(255,255,255,.15);font-size:42px;font-weight:300;line-height:1;
  }
  .slots-arrows{
    color:rgba(255,255,255,.12);font-size:26px;font-weight:800;
    flex-shrink:0;
  }

  .upgrade-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:calc(100% - 8px);height:52px;
    border-radius:999px;border:none;cursor:pointer;
    background:#007AFF;
    color:#fff;font-size:15px;font-weight:700;
    letter-spacing:.01em;
  }
  .upgrade-btn img{
    width:18px;height:18px;object-fit:contain;
    filter:brightness(0) invert(1);
  }

  /* === BOTTOM NAV === */
  .bottom-nav{
    position:absolute;bottom:14px;left:12px;right:12px;padding:8px 6px;
    display:flex;align-items:center;justify-content:space-around;
    background:rgba(255,255,255,.08);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
    border:1px solid rgba(255,255,255,.08);border-radius:999px;z-index:10;
  }
  .nav-indicator{
    position:absolute;width:58px;height:58px;border-radius:50%;
    background:rgba(0,122,255,.13);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    z-index:1;pointer-events:none;top:0;left:0;
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:4px 0;width:56px;cursor:pointer;position:relative;
    -webkit-user-select:none;user-select:none;z-index:2;
    transition:transform .3s cubic-bezier(.4,0,.2,1);
  }
  .nav-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
  .nav-icon img{
    width:24px;height:24px;object-fit:contain;
    filter:brightness(0) invert(1);opacity:.4;
  }
  .nav-label{
    font-size:10px;font-weight:500;color:rgba(255,255,255,.4);
    position:relative;z-index:2;
  }
  .nav-item.active{transform:scale(1.15)}
  .nav-item.active .nav-label{color:#007AFF}
  .nav-item.active .nav-icon img{
    opacity:1;
    filter:brightness(0) saturate(100%) invert(33%) sepia(100%) saturate(3000%) hue-rotate(207deg) brightness(103%) contrast(101%);
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="user-pill">
      <img class="user-avatar-small" id="avatarSmall" src="" alt="">
      <span class="user-name-top" id="usernameTop">User</span>
    </div>
    <div class="right-group">
      <div class="balance-pill">
        <span>0</span>
        <img class="star-icon" src="assets/star.png" alt="star">
      </div>
      <button class="add-btn" aria-label="Add">
        <svg fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>



  <!-- PROFILE PAGE -->
  <div class="page" id="profilePage">
    <div class="section-title">Профиль</div>
    <div class="profile-card">
      <div class="profile-avatar-wrap">
        <img class="profile-avatar" id="profileAvatar" src="" alt="">
        <div class="settings-badge">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="#fff" stroke-width="1.6"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1.08z" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="profile-name" id="profileName">User</div>
      <div class="profile-username" id="profileUser">@user</div>
    </div>

    <div class="section-title">Промокоды</div>
    <div class="promo-input-wrap">
      <input class="promo-input" type="text" placeholder="Введите промокод">
      <button class="promo-btn">Применить</button>
    </div>

    <div class="referral-card">
      <div class="referral-text">
        <h3>РЕФЕРАЛЬНАЯ СИСТЕМА</h3>
        <p>Приглашайте людей, чтобы получать бонусы</p>
      </div>
      <div class="referral-arrow">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="inventory-header">
      <span class="inventory-title">Инвентарь</span>
      <span class="inventory-count">0 подарков</span>
      <button class="sell-all-btn">Продать все 0 <img src="assets/star.png" alt="star"></button>
    </div>

    <div class="inventory-empty">
      <div class="lottie-wrap" id="lottieContainer"></div>
      <div class="empty-title">Не нашли подарков?</div>
      <div class="empty-desc">Отправьте подарок <a href="https://t.me/GiftPepe_Releyer" target="_blank">@GiftPepe_Releyer</a><br>или выиграйте в играх</div>
    </div>
  </div>

  <!-- UPGRADE PAGE -->
  <div class="page" id="upgradePage">
    <div class="upgrade-page">
      <div class="upgrade-circle-outer">
        <div class="upgrade-circle-inner">
          <img src="assets/logotip.png" alt="">
        </div>
      </div>

      <div class="upgrade-subtitle">Выберите подарок</div>

      <div class="slots-row">
        <div class="slot-cell"><span>+</span></div>
        <div class="slots-arrows">»</div>
        <div class="slot-cell"><span>+</span></div>
      </div>

      <button class="upgrade-btn">
        Сделать апгрейд
        <img src="svg/rise.svg" alt="">
      </button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav">
    <div class="nav-indicator" id="indicator"></div>
    <div class="nav-item active" data-tab="top">
      <div class="nav-icon"><img src="svg/trophy.svg" alt=""></div>
      <span class="nav-label">Топ</span>
    </div>
    <div class="nav-item" data-tab="craft">
      <div class="nav-icon"><img src="svg/craft.svg" alt=""></div>
      <span class="nav-label">Крафт</span>
    </div>
    <div class="nav-item" data-tab="crash">
      <div class="nav-icon"><img src="svg/crash.svg" alt=""></div>
      <span class="nav-label">Краш</span>
    </div>
    <div class="nav-item" data-tab="upgrade">
      <div class="nav-icon"><img src="svg/rise.svg" alt=""></div>
      <span class="nav-label">Апгрейд</span>
    </div>
    <div class="nav-item" data-tab="profile">
      <div class="nav-icon"><img src="svg/user.svg" alt=""></div>
      <span class="nav-label">Профиль</span>
    </div>
  </nav>

</div>

<script>
  const tg=window.Telegram?.WebApp;
  let firstName='User',userHandle='@user',photoUrl='';
  if(tg){
    tg.ready();tg.expand();
    try{tg.setHeaderColor('#000000')}catch(e){}
    try{tg.setBackgroundColor('#000000')}catch(e){}
    const u=tg.initDataUnsafe?.user;
    if(u){
      firstName=u.first_name||u.username||'User';
      userHandle=u.username?'@'+u.username:'@user';
      photoUrl=u.photo_url||'';
      document.getElementById('usernameTop').textContent=firstName;
      if(photoUrl){
        document.getElementById('avatarSmall').src=photoUrl;
        document.getElementById('profileAvatar').src=photoUrl;
      }
    }
  }
  document.getElementById('profileName').textContent=firstName;
  document.getElementById('profileUser').textContent=userHandle;

  lottie.loadAnimation({
    container:document.getElementById('lottieContainer'),
    renderer:'svg',loop:true,autoplay:true,
    path:'assets/PlushPepe(blue).json'
  });

  const nav=document.getElementById('bottomNav');
  const ind=document.getElementById('indicator');
  const items=document.querySelectorAll('.nav-item');
  const pages={
    profile:document.getElementById('profilePage'),
    upgrade:document.getElementById('upgradePage')
  };

  function moveIndicator(el,animate){
    const r=el.getBoundingClientRect();
    const n=nav.getBoundingClientRect();
    const x=r.left+r.width/2-n.left-29;
    const y=r.top+r.height/2-n.top-29;
    if(!animate)ind.style.transition='none';
    ind.style.transform=`translate(${x}px,${y}px)`;
    if(!animate)requestAnimationFrame(()=>{ind.style.transition=''});
  }

  function showTab(tab){
    Object.values(pages).forEach(p=>p.classList.remove('visible'));
    if(pages[tab])pages[tab].classList.add('visible');
  }

  requestAnimationFrame(()=>moveIndicator(document.querySelector('.nav-item.active'),false));

  items.forEach(item=>{
    item.addEventListener('click',()=>{
      document.querySelector('.nav-item.active')?.classList.remove('active');
      item.classList.add('active');
      moveIndicator(item,true);
      showTab(item.dataset.tab);
    });
  });
</script>
</body>
</html>
